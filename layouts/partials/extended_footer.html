<script type="module" src="{{ .Site.BaseURL }}scripts/model-viewer.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    handleNoSupportForWebGL();
    handleJSReliantElements();
    handlePopoverClickThroughBlocker();
  });

  function handleNoSupportForWebGL() {
    const canvas = document.createElement('canvas');
    if (window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl'))) {

      setTimeout(function () {
        Array.from(document.querySelectorAll('div.loadingPoster')).forEach(loading => {
          loading.style.display = 'flex';
        });
      }, 250);

      return;
    }

    Array.from(document.querySelectorAll('model-viewer')).forEach(webglError => {
      webglError.style.display = 'none';
    });

    Array.from(document.querySelectorAll('div.modelError')).forEach(webglError => {
      webglError.style.display = 'flex';
    });
  }

  function handleJSReliantElements() {
    Array.from(document.querySelectorAll('.hide-when-no-js')).forEach(element => {
      element.classList.remove('hide-when-no-js');
    });
  }

  function toggleOptions(button) {
    const isExpanded = button.getAttribute("aria-expanded") === "true";
    button.setAttribute("aria-expanded", !isExpanded);

    const table = button.closest('.model-download');
    table.querySelectorAll('.download-option').forEach(row => {
      row.classList.toggle('expanded');
    });
  }

  function handlePopoverClickThroughBlocker() {
    const blocker = document.getElementById('click-through-blocker');
    if (!blocker) return;

    const isAnyPopoverOpen = () => {
      const popovers = Array.from(document.querySelectorAll('[popover]'));
      let anyOpen = popovers.some(p => {
        try {
          return p.matches(':popover-open');
        } catch (e) {
          return false;
        }
      });

      if (!anyOpen) {
        anyOpen = popovers.some(p => {
          try {
            const style = window.getComputedStyle(p);
            if (style.display === 'none' || style.visibility === 'hidden') return false;
            const r = p.getBoundingClientRect();
            return r.width > 0 && r.height > 0;
          } catch (e) {
            return false;
          }
        });
      }
      return anyOpen;
    };

    const updateBlockerVisibility = () => {
      blocker.style.display = isAnyPopoverOpen() ? 'block' : 'none';
    };

    const stop = function (e) {
      if (!isAnyPopoverOpen()) {
        blocker.style.display = 'none';
        return;
      }
      if (e.cancelable) e.preventDefault();
      e.stopPropagation();
    };

    ['pointerdown', 'pointerup', 'pointermove', 'touchstart', 'touchend', 'click'].forEach(evt => {
      blocker.addEventListener(evt, stop, { passive: false, capture: true });
    });

    document.querySelectorAll('.popover-button, .popover-close-button').forEach(btn => {
      btn.addEventListener('click', function () {
        setTimeout(updateBlockerVisibility, 0);
      });
    });

    blocker.addEventListener('click', function (e) {
      document.querySelectorAll('[popover]').forEach(p => {
        const closeBtn = p.querySelector('[popovertargetaction="hide"]');
        if (closeBtn) closeBtn.click();
      });
      setTimeout(updateBlockerVisibility, 0);
    }, { passive: false, capture: true });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' || e.key === 'Esc') {
        setTimeout(updateBlockerVisibility, 0);
      }
    }, { passive: true });

    setTimeout(updateBlockerVisibility, 0);
  }
</script>

<div id="click-through-blocker"></div>
